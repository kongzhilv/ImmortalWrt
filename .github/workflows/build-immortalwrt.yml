name: Build ImmortalWrt (RAX3000M eMMC)

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: write

env:
  # 使用真正的 ImmortalWrt 源码
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: 检出当前仓库代码
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo apt-get update
        sudo apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget
        sudo timedatectl set-timezone "$TZ"

    - name: 克隆 ImmortalWrt 源码
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: 运行自定义源脚本 (DIY-part1)
      run: |
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 & 安装 Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 运行系统定制脚本 (DIY-part2)
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig

    - name: 下载软件包依赖
      id: package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 大扫除：只提取核心固件与软件列表
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        
        # 严格保留指令：只留下 .itb网页升级包、包含 emmc 字样的 .bin线刷包，以及 .manifest软件列表。
        find . -maxdepth 1 -type f ! -name "*sysupgrade.itb" ! -name "*emmc*.bin" ! -name "*.manifest" -exec rm -f {} +
        
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布至 Releases
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: "RAX3000M_eMMC_${{ github.run_number }}"
        body: |
          🚀 ImmortalWrt 最新主干编译完成！
          📱 机型: CMCC RAX3000M (eMMC)
          📦 包含: OpenClash, AdGuardHome, Docker, 完整USB与5G驱动
          📄 安装的全部软件明细请下载下方的 .manifest 文件查看
        files: ${{ env.FIRMWARE }}/*
